<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#191410" />
    <title>Yoddha Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&family=Tiro+Devanagari+Sanskrit&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; background: #191410; }
      body {
        font-family: "Inter", system-ui, sans-serif;
        color: #f3ebdd;
        overscroll-behavior-y: none;
      }
      button { font-family: inherit; }
      input, textarea { font-family: inherit; }
      ::selection { background: #e68a3455; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      }
      @keyframes glowPulse {
        0% { box-shadow: 0 0 0 0 rgba(230,138,52,0.35); }
        70% { box-shadow: 0 0 0 14px rgba(230,138,52,0); }
        100% { box-shadow: 0 0 0 0 rgba(230,138,52,0); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: none; }
      }
      @keyframes sheetUp {
        from { transform: translateY(24px); opacity: 0; }
        to { transform: none; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
